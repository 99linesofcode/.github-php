version: 2

updates:
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: daily
      time: 06:00
    reviewers:
      - 99linesofcode
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: 06:00
    reviewers:
      - 99linesofcode
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: daily
      time: 06:00
    reviewers:
      - 99linesofcode
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
